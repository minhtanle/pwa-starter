<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />

    <!-- viewport: viewport-fit=cover là bắt buộc để safe-area env() hoạt động -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>App PWA</title>

    <!-- PWA meta -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PWA App" />
    <meta name="theme-color" content="#ffffff" />

    <link rel="manifest" href="./manifest.json" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="./main.css" />
</head>

<body class="bg-white text-gray-900">
    <div id="app">
        <!-- Header: back | title | settings -->
        <header id="app-header" class="bg-white border-b border-gray-200">
            <!-- Back -->
            <button id="btn-back" class="header-btn hidden" aria-label="Quay lại">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6" />
                </svg>
            </button>

            <!-- Title -->
            <span class="header-title">Home</span>

            <!-- Settings -->
            <button id="btn-settings" class="header-btn header-right" aria-label="Cài đặt">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3" />
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                   a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                   A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                   l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                   A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                   l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                   a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                   l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                   a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
            </button>

        </header>

        <!-- Content -->
        <main id="app-content">
            <!-- Home screen: app grid -->
            <div id="home-screen" class="p-6">
                <div class="grid grid-cols-4 gap-6">
                    <!-- App icons will be injected here by JS -->
                </div>
            </div>

            <!-- App content container (hidden by default) -->
            <div id="app-view" class="hidden">
                <!-- Dynamic app content loads here -->
            </div>

            <!-- Settings page (hidden by default) -->
            <div id="settings-page" class="hidden p-6 ios-scroll-lock">
                <h2 class="text-xl font-bold mb-6">Cài đặt</h2>

                <div class="space-y-4">
                    <!-- Debug CSS -->
                    <div class="setting-item bg-gray-50 p-4 rounded-2xl">
                        <h3 class="font-bold text-gray-800 mb-2">Debug CSS</h3>
                        <p class="text-sm text-gray-500 mb-3">Kiểm tra và debug CSS của ứng dụng</p>
                        <button id="btn-debug-css" class="w-full py-3 bg-blue-500 text-white font-bold rounded-xl text-sm active:scale-95 transition-transform">
                            Mở Debug CSS
                        </button>
                    </div>

                    <!-- Debug Edura -->
                    <div class="setting-item bg-gray-50 p-4 rounded-2xl">
                        <h3 class="font-bold text-gray-800 mb-2">Debug Edura</h3>
                        <p class="text-sm text-gray-500 mb-3">Kiểm tra và debug hệ thống Edura</p>
                        <button id="btn-debug-edura" class="w-full py-3 bg-purple-500 text-white font-bold rounded-xl text-sm active:scale-95 transition-transform">
                            Mở Debug Edura
                        </button>
                    </div>

                    <!-- Tải PWA -->
                    <div class="setting-item bg-gray-50 p-4 rounded-2xl">
                        <h3 class="font-bold text-gray-800 mb-2">Tải PWA</h3>
                        <p class="text-sm text-gray-500 mb-3">Cài đặt ứng dụng lên thiết bị</p>
                        <button id="btn-install-pwa" class="w-full py-3 bg-[#A11B4B] text-white font-bold rounded-xl text-sm active:scale-95 transition-transform">
                            Cài đặt ngay
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Install Prompt -->
        <div id="install-prompt" class="hidden fixed bottom-4 left-4 right-4 bg-white p-4 rounded-2xl shadow-lg z-50">
            <p class="text-sm text-gray-600 mb-2">Cài đặt ứng dụng để trải nghiệm tốt hơn</p>
            <button id="install-btn" class="w-full py-2 bg-[#A11B4B] text-white font-bold rounded-xl text-sm">Cài đặt</button>
            <button id="close-install" class="mt-2 w-full text-xs text-gray-400">Đóng</button>
        </div>
    </div>

    <!-- JS -->
    <script src="./app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered:', reg))
                    .catch(err => console.log('SW registration failed:', err))
            })
        }
    </script>
</body>

</html>
