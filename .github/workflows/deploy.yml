name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          STATUS_ICON="[SUCCESS]"
          if [ "$JOB_STATUS" != "success" ]; then
            STATUS_ICON="[FAILED]"
          fi

          SHORT_SHA="${COMMIT_SHA::7}"
          MESSAGE="${STATUS_ICON} GitHub Pages deploy <b>${JOB_STATUS}</b>"
          MESSAGE+=$'\nRepo: <b>'"${REPO}"'</b>'
          MESSAGE+=$'\nBranch: <b>'"${REF_NAME}"'</b>'
          MESSAGE+=$'\nActor: <b>'"${ACTOR}"'</b>'
          MESSAGE+=$'\nCommit: <code>'"${SHORT_SHA}"'</code>'
          MESSAGE+=$'\nRun: '"${RUN_URL}"

          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "[Telegram] Skipped: secrets not set"
            exit 0
          fi

          RESPONSE=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            --data-urlencode "text=${MESSAGE}")
          echo "[Telegram] Response: ${RESPONSE}"
